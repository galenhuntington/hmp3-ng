on: [push]
name: build
jobs:
  cabal:
    strategy:
      matrix:
        host: ['ubuntu-22.04']
        ghc: ['8.10', '9.0']
    runs-on: ${{ matrix.host }}
    name: GHC on ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v6
        with:
          ghc-version: ${{ matrix.ghc }}
      - uses: haskell-actions/setup@v2
      - run: cabal build all
      - run: cabal test all --test-show-details=streaming

