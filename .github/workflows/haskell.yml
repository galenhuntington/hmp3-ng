on: [push]
name: build
jobs:
  cabal:
    strategy:
      matrix:
        host: ['macos-latest']
    runs-on: ${{ matrix.host }}
    name: Stack on ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v6
      - run: brew install pcre
      - uses: haskell-actions/setup@v2
      - run: cabal build all
      - run: cabal test all --test-show-details=streaming

