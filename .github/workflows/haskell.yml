on: [push]
name: build
jobs:
  cabal:
    strategy:
      matrix:
        ghc: ['latest']
        system: ['macos-latest']
    runs-on: ${{ matrix.system }}
    name: GHC ${{ matrix.ghc }} on ${{ matrix.system }}
    steps:
      - uses: actions/checkout@v6
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
      - run: cabal build all
      - run: cabal test all --test-show-details=streaming

